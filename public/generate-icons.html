<!DOCTYPE html>
<html>
<head>
  <title>Gerar Ícones PWA</title>
</head>
<body>
  <h1>Gerar Ícones PWA</h1>
  <p>Abra este arquivo no navegador e clique nos botões para baixar os ícones:</p>
  <button onclick="generateIcon(192)">Baixar Ícone 192x192</button>
  <button onclick="generateIcon(512)">Baixar Ícone 512x512</button>
  <script>
    function generateIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      ctx.fillStyle = '#d81e62';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.166);
      ctx.fill();
      
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('W', size/2, size/2);
      
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
